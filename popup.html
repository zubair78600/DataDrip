<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Google Maps Scraper</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="popup">
      <h1>Google Maps Scraper</h1>
      <p class="description">
        The draggable overlay opens directly on Google Maps. Use this popup only if you
        need to re-open it or trigger Start from the toolbar.
      </p>

      <button id="openOverlayButton" type="button">Show Overlay</button>
      <button id="startOverlayButton" type="button" class="secondary">
        Show Overlay &amp; Start
      </button>
      <p id="status" class="status">Ready.</p>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
